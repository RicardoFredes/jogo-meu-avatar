<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN - Lauren Fashion Asset Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="admin-header">
    <h1>ADMIN <span class="accent">Asset Editor</span></h1>
    <div class="header-actions">
      <select id="sel-body" class="adm-select"><option value="child">Crianca</option><option value="adult">Adulto</option></select>
      <button id="btn-new-item" class="adm-btn" style="background:var(--success);border-color:var(--success);color:#000;font-weight:600;">+ Novo Item</button>
      <button id="btn-import" class="adm-btn">Import SVG</button>
      <button id="btn-copy" class="adm-btn">Copy SVG</button>
      <button id="btn-download" class="adm-btn adm-btn-primary">Download SVG</button>
    </div>
  </header>

  <div class="admin-layout">
    <!-- Left: Tools + Layers -->
    <aside class="panel panel-left">
      <section class="panel-section">
        <h3 class="panel-title">Ferramentas</h3>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="pen" title="Pen Tool (P)">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
            Pen
          </button>
          <button class="tool-btn" data-tool="select" title="Select (V)">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4L7 18V2z" fill="currentColor"/></svg>
            Select
          </button>
          <button class="tool-btn" data-tool="move" title="Move (M)">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z" fill="currentColor"/></svg>
            Move
          </button>
          <button class="tool-btn" data-tool="delete" title="Delete (Del)">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>
            Delete
          </button>
        </div>
      </section>

      <section class="panel-section">
        <h3 class="panel-title">Acoes</h3>
        <div class="tool-grid">
          <button class="adm-btn action-btn" id="btn-center" title="Centralizar (C)">Centralizar</button>
          <button class="adm-btn action-btn" id="btn-mirror" title="Espelhar (H)">Espelhar H</button>
          <button class="adm-btn action-btn" id="btn-clone-point" title="Clona ponto selecionado (D)">Clonar Pt</button>
          <button class="adm-btn action-btn" id="btn-remove-point" title="Remove ponto selecionado (Del)">- Ponto</button>
          <label class="chk-label" style="grid-column:1/-1;margin-top:4px;">
            <input type="checkbox" id="chk-mirror-mode"> Modo Mirror
          </label>
        </div>
      </section>

      <section class="panel-section">
        <h3 class="panel-title">Transformar <label class="chk-label" style="margin-left:auto;font-size:10px;"><input type="checkbox" id="chk-transform-all" checked> Todos layers</label></h3>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="display:flex;align-items:center;gap:4px;">
            <label style="font-size:11px;color:var(--dim);width:50px;">Scale X</label>
            <input type="number" id="tf-scale-x" class="adm-input" style="width:60px;" value="100" step="5" min="1" max="500">
            <label style="font-size:11px;color:var(--dim);">%</label>
          </div>
          <div style="display:flex;align-items:center;gap:4px;">
            <label style="font-size:11px;color:var(--dim);width:50px;">Scale Y</label>
            <input type="number" id="tf-scale-y" class="adm-input" style="width:60px;" value="100" step="5" min="1" max="500">
            <label style="font-size:11px;color:var(--dim);">%</label>
          </div>
          <div style="display:flex;align-items:center;gap:4px;">
            <label style="font-size:11px;color:var(--dim);width:50px;">Move X</label>
            <input type="number" id="tf-move-x" class="adm-input" style="width:60px;" value="0" step="5">
            <label style="font-size:11px;color:var(--dim);">px</label>
          </div>
          <div style="display:flex;align-items:center;gap:4px;">
            <label style="font-size:11px;color:var(--dim);width:50px;">Move Y</label>
            <input type="number" id="tf-move-y" class="adm-input" style="width:60px;" value="0" step="5">
            <label style="font-size:11px;color:var(--dim);">px</label>
          </div>
          <button class="adm-btn adm-btn-primary" id="btn-transform-apply" style="width:100%;">Aplicar</button>
        </div>
        </div>
      </section>

      <section class="panel-section">
        <h3 class="panel-title">Categoria</h3>
        <select id="sel-category" class="adm-select">
          <option value="hair-back">Cabelo (atras)</option>
          <option value="hair-front">Franja (frente)</option>
          <option value="face-shapes">Rosto</option>
          <option value="eyes">Olhos</option>
          <option value="noses">Nariz</option>
          <option value="mouths">Boca</option>
          <option value="tops">Blusas</option>
          <option value="bottoms">Calcas</option>
          <option value="shoes">Sapatos</option>
          <option value="full-body">Vestidos</option>
          <option value="patterns">Padronagens</option>
          <option value="head-acc">Acess. Cabeca</option>
          <option value="face-acc">Acess. Rosto</option>
          <option value="body-acc">Acess. Corpo</option>
        </select>
      </section>

      <section class="panel-section">
        <h3 class="panel-title">Assets Existentes</h3>
        <div id="asset-browser" class="asset-browser"></div>
      </section>

      <section class="panel-section flex-grow">
        <h3 class="panel-title">Layers <span class="badge" id="layer-count">0</span></h3>
        <div id="layer-list" class="layer-list"></div>
        <button id="btn-new-path" class="adm-btn" style="width:100%;margin-top:8px">+ Novo Path</button>
      </section>
    </aside>

    <!-- Center: Canvas -->
    <main class="panel panel-center">
      <div class="canvas-wrapper">
        <!-- Konva preview (background, non-interactive) -->
        <div id="konva-preview" class="canvas-layer"></div>
        <!-- Paper.js drawing canvas (foreground, interactive) -->
        <canvas id="paper-canvas" class="canvas-layer" resize></canvas>
      </div>
      <div class="canvas-footer">
        <span id="status-bar">Pen Tool - Clique para adicionar pontos</span>
        <label class="chk-label"><input type="checkbox" id="chk-preview" checked> Preview</label>
        <label class="chk-label"><input type="checkbox" id="chk-guides" checked> Guias</label>
        <label class="chk-label"><input type="checkbox" id="chk-transparency" checked> Transparencia</label>
        <div class="zoom-bar">
          <button class="adm-btn" id="btn-pan" title="Pan (Space para ativar temporario)">Pan</button>
          <button class="adm-btn" id="btn-reset-pan" title="Reset Pan (0)">Reset</button>
          <span class="zoom-sep">|</span>
          <button class="adm-btn" id="btn-zoom-out" title="Zoom Out (-)">-</button>
          <input type="range" id="zoom-slider" min="25" max="300" value="80" step="5">
          <button class="adm-btn" id="btn-zoom-in" title="Zoom In (+)">+</button>
          <span id="zoom-value">80%</span>
        </div>
      </div>
    </main>

    <!-- Right: Properties -->
    <aside class="panel panel-right">
      <section class="panel-section">
        <h3 class="panel-title">Propriedades</h3>
        <div id="props-empty" class="props-empty">Selecione um path</div>
        <div id="props-form" class="props-form hidden">
          <div class="prop-group">
            <label>Fill</label>
            <div class="color-row">
              <input type="color" id="prop-fill" value="#FF00FF">
              <button class="adm-btn color-preset" data-color="#FF00FF" title="Placeholder">M</button>
              <button class="adm-btn color-preset" data-color="none" title="Sem fill">X</button>
            </div>
          </div>
          <div class="prop-group">
            <label>Stroke</label>
            <div class="color-row">
              <input type="color" id="prop-stroke" value="#CC00CC">
              <button class="adm-btn color-preset" data-color="#CC00CC" title="Stroke placeholder">S</button>
            </div>
          </div>
          <div class="prop-group">
            <label>Stroke Width</label>
            <input type="number" id="prop-stroke-width" class="adm-input" value="6" min="0" max="20" step="1">
          </div>
          <div class="prop-group">
            <label>Opacity</label>
            <input type="range" id="prop-opacity" min="0" max="100" value="100" step="5">
            <span id="prop-opacity-value">100%</span>
          </div>
          <div class="prop-group">
            <label class="chk-label"><input type="checkbox" id="prop-closed" checked> Path fechado</label>
          </div>

          <hr class="divider">
          <h4 class="sub-title">Ponto Selecionado</h4>
          <div id="segment-props" class="props-form hidden">
            <div class="prop-group">
              <label>Posicao</label>
              <div style="display:flex;gap:4px;">
                <input type="number" id="seg-x" class="adm-input" style="width:50%" step="1" placeholder="X">
                <input type="number" id="seg-y" class="adm-input" style="width:50%" step="1" placeholder="Y">
              </div>
            </div>
            <div class="prop-group">
              <label>Tipo</label>
              <div style="display:flex;gap:4px;">
                <button class="adm-btn seg-type-btn" data-type="corner" title="Canto reto">Canto</button>
                <button class="adm-btn seg-type-btn" data-type="smooth" title="Curva suave">Curva</button>
                <button class="adm-btn seg-type-btn" data-type="symmetric" title="Curva simetrica">Simetrica</button>
              </div>
            </div>
            <div class="prop-group" id="handle-group">
              <label>Handles</label>
              <div style="display:flex;gap:4px;align-items:center;margin-bottom:4px;">
                <span style="font-size:10px;width:20px;">In:</span>
                <input type="number" id="handle-in-x" class="adm-input" style="width:40%" step="1">
                <input type="number" id="handle-in-y" class="adm-input" style="width:40%" step="1">
              </div>
              <div style="display:flex;gap:4px;align-items:center;">
                <span style="font-size:10px;width:20px;">Out:</span>
                <input type="number" id="handle-out-x" class="adm-input" style="width:40%" step="1">
                <input type="number" id="handle-out-y" class="adm-input" style="width:40%" step="1">
              </div>
            </div>
          </div>
          <div id="segment-empty" class="prop-group">
            <span id="point-count">0 pontos - clique num ponto para editar</span>
          </div>
        </div>
      </section>

      <section class="panel-section">
        <h3 class="panel-title">SVG Output</h3>
        <textarea id="svg-output" class="svg-textarea" rows="6" readonly placeholder="SVG aparece aqui ao exportar"></textarea>
        <button id="btn-save-asset" class="adm-btn adm-btn-primary" style="width:100%;margin-top:8px;height:34px;">Salvar no Jogo</button>
      </section>
    </aside>
  </div>

  <!-- Import file input (hidden) -->
  <input type="file" id="file-import" accept=".svg" style="display:none">

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Dependencies -->
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/paper@0.12.18/dist/paper-full.min.js"></script>

  <!-- Game modules (for character preview) -->
  <script src="js/storage.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/config-loader.js"></script>
  <script src="js/renderer.js"></script>

  <!-- Admin module -->
  <script src="js/admin.js"></script>
</body>
</html>
