<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Tank Top: sleeveless, straps, body from y=116 to y=178 -->
  <!-- Left strap -->
  <path d="M 70,98 Q 72,106 76,116" fill="none" stroke="#FF00FF" stroke-width="6" stroke-linecap="round"/>
  <!-- Right strap -->
  <path d="M 110,98 Q 108,106 104,116" fill="none" stroke="#FF00FF" stroke-width="6" stroke-linecap="round"/>
  <!-- Strap outlines -->
  <path d="M 70,98 Q 72,106 76,116" fill="none" stroke="#CC00CC" stroke-width="1" stroke-linecap="round"/>
  <path d="M 110,98 Q 108,106 104,116" fill="none" stroke="#CC00CC" stroke-width="1" stroke-linecap="round"/>
  <!-- Body -->
  <path d="
    M 76,116
    Q 82,112 90,112
    Q 98,112 104,116
    L 118,120
    L 118,174
    Q 104,180 90,180
    Q 76,180 62,174
    L 62,120
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Scoop neckline -->
  <path d="M 76,116 Q 82,112 90,112 Q 98,112 104,116" fill="none" stroke="#CC00CC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom hem -->
  <path d="M 62,174 Q 76,180 90,180 Q 104,180 118,174" fill="none" stroke="#CC00CC" stroke-width="1" stroke-linecap="round"/>
</svg>
