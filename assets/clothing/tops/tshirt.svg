<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- T-Shirt: round neckline, short sleeves, body to y=178 -->
  <!-- Main body + sleeves as one shape -->
  <path d="
    M 70,98
    Q 80,92 90,92
    Q 100,92 110,98
    L 124,118
    L 138,124
    L 140,140
    L 124,136
    L 125,174
    Q 108,180 90,180
    Q 72,180 55,174
    L 56,136
    L 42,140
    L 40,124
    L 56,118
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Neckline detail -->
  <path d="
    M 70,98
    Q 80,92 90,92
    Q 100,92 110,98
  " fill="none" stroke="#CC00CC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom hem curve -->
  <path d="M 55,174 Q 72,180 90,180 Q 108,180 125,174" fill="none" stroke="#CC00CC" stroke-width="1" stroke-linecap="round"/>
  <!-- Left sleeve seam -->
  <path d="M 56,118 L 42,124" fill="none" stroke="#CC00CC" stroke-width="0.8" opacity="0.5"/>
  <!-- Right sleeve seam -->
  <path d="M 124,118 L 138,124" fill="none" stroke="#CC00CC" stroke-width="0.8" opacity="0.5"/>
</svg>
