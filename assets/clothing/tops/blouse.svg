<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Blouse: collar points, puffy short sleeves, buttons -->
  <!-- Main body -->
  <path d="M 72,104 L 62,118 L 62,174 Q 76,180 90,180 Q 104,180 118,174 L 118,118 L 108,104 Z" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left puffy sleeve -->
  <path d="M 72,104 L 50,108 Q 36,112 38,126 Q 40,138 52,134 L 62,122" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right puffy sleeve -->
  <path d="M 108,104 L 130,108 Q 144,112 142,126 Q 140,138 128,134 L 118,122" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Collar left point -->
  <path d="M 80,96 L 72,104 L 80,112 Z" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Collar right point -->
  <path d="M 100,96 L 108,104 L 100,112 Z" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Collar neckline -->
  <path d="M 80,96 Q 85,92 90,92 Q 95,92 100,96" fill="none" stroke="#CC00CC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- V-neck center line -->
  <path d="M 80,96 Q 88,108 90,112 Q 92,108 100,96" fill="none" stroke="#CC00CC" stroke-width="1.2"/>
  <!-- Buttons -->
  <circle cx="90" cy="122" r="1.5" fill="#CC00CC"/>
  <circle cx="90" cy="138" r="1.5" fill="#CC00CC"/>
  <circle cx="90" cy="154" r="1.5" fill="#CC00CC"/>
  <!-- Bottom hem -->
  <path d="M 62,174 Q 76,180 90,180 Q 104,180 118,174" fill="none" stroke="#CC00CC" stroke-width="1" stroke-linecap="round"/>
</svg>
