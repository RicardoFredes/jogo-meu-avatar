<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Hoodie: long sleeves, hood, kangaroo pocket, drawstrings -->
  <!-- Hood (behind everything) -->
  <path d="
    M 60,98
    Q 58,82 66,76
    Q 78,68 90,68
    Q 102,68 114,76
    Q 122,82 120,98
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hood inner edge -->
  <path d="M 66,96 Q 78,88 90,88 Q 102,88 114,96" fill="none" stroke="#CC00CC" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Main body + long sleeves -->
  <path d="
    M 70,98
    Q 80,92 90,92
    Q 100,92 110,98
    L 124,118
    L 148,195
    Q 150,200 146,201
    L 138,202
    Q 135,202 134,198
    L 118,136
    L 125,174
    Q 108,180 90,180
    Q 72,180 55,174
    L 62,136
    L 46,198
    Q 45,202 42,202
    L 34,201
    Q 30,200 32,195
    L 56,118
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Neckline -->
  <path d="M 70,98 Q 80,92 90,92 Q 100,92 110,98" fill="none" stroke="#CC00CC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Kangaroo pocket -->
  <rect x="68" y="150" width="44" height="20" rx="6" ry="6" fill="none" stroke="#CC00CC" stroke-width="1.2"/>
  <!-- Pocket center line -->
  <line x1="90" y1="150" x2="90" y2="170" stroke="#CC00CC" stroke-width="0.8" opacity="0.5"/>
  <!-- Drawstrings -->
  <line x1="84" y1="98" x2="82" y2="114" stroke="#CC00CC" stroke-width="0.8"/>
  <line x1="96" y1="98" x2="98" y2="114" stroke="#CC00CC" stroke-width="0.8"/>
  <!-- Drawstring tips -->
  <circle cx="82" cy="115" r="1" fill="#CC00CC"/>
  <circle cx="98" cy="115" r="1" fill="#CC00CC"/>
  <!-- Left cuff -->
  <path d="M 32,195 Q 30,200 34,201 L 42,202 Q 45,202 46,198" fill="none" stroke="#CC00CC" stroke-width="1" opacity="0.6"/>
  <!-- Right cuff -->
  <path d="M 148,195 Q 150,200 146,201 L 138,202 Q 135,202 134,198" fill="none" stroke="#CC00CC" stroke-width="1" opacity="0.6"/>
  <!-- Bottom hem -->
  <path d="M 55,174 Q 72,180 90,180 Q 108,180 125,174" fill="none" stroke="#CC00CC" stroke-width="1" stroke-linecap="round"/>
</svg>
