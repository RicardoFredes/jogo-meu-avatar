<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Princess Dress: sweetheart neckline, puffy sleeves, fitted bodice, wide flared skirt -->
  <!-- Fitted bodice -->
  <path d="M 72,102 L 66,118 L 64,178 L 116,178 L 114,118 L 108,102 Z" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Wide princess skirt -->
  <path d="
    M 64,178
    L 20,276
    Q 18,280 22,280
    L 158,280
    Q 162,280 160,276
    L 116,178
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left puffy sleeve -->
  <path d="M 72,102 L 48,98 Q 32,98 34,114 Q 36,130 52,126 L 66,118" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right puffy sleeve -->
  <path d="M 108,102 L 132,98 Q 148,98 146,114 Q 144,130 128,126 L 114,118" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Sweetheart neckline -->
  <path d="M 72,102 Q 78,96 82,98 Q 86,100 90,94 Q 94,100 98,98 Q 102,96 108,102" fill="none" stroke="#CC00CC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Waist sash / ribbon -->
  <path d="M 64,176 Q 90,170 116,176" fill="none" stroke="#CC00CC" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bow at waist -->
  <ellipse cx="90" cy="180" rx="8" ry="4" fill="#CC00CC" opacity="0.5"/>
  <!-- Bow tails -->
  <path d="M 84,180 Q 80,188 76,190" stroke="#CC00CC" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 96,180 Q 100,188 104,190" stroke="#CC00CC" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Skirt ruffle layers -->
  <path d="M 30,220 Q 60,214 90,220 Q 120,226 150,220" fill="none" stroke="#CC00CC" stroke-width="0.8" opacity="0.3"/>
  <path d="M 24,250 Q 60,244 90,250 Q 120,256 156,250" fill="none" stroke="#CC00CC" stroke-width="0.8" opacity="0.3"/>
  <!-- Skirt fold lines -->
  <path d="M 76,180 L 40,278" stroke="#CC00CC" stroke-width="0.5" opacity="0.2"/>
  <path d="M 90,178 L 90,278" stroke="#CC00CC" stroke-width="0.5" opacity="0.2"/>
  <path d="M 104,180 L 140,278" stroke="#CC00CC" stroke-width="0.5" opacity="0.2"/>
</svg>
