    L 72,295
    Q 76,295 76,291
    L 76,188
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right leg -->
  <path d="
    M 104,188
    L 104,291
    Q 104,295 108,295
    L 128,295
    Q 132,295 132,291
    L 130,188
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
