<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- A-line Skirt: waistband y=178-186, flares to y=250 -->
  <!-- Waistband -->
  <rect x="58" y="178" width="64" height="8" rx="4" ry="4" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5"/>
  <!-- Flared skirt body -->
  <path d="
    M 60,186
    L 38,246
    Q 36,250 40,250
    L 140,250
    Q 144,250 142,246
    L 120,186
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Pleat / fold lines -->
  <path d="M 72,186 L 56,248" stroke="#CC00CC" stroke-width="0.7" opacity="0.3"/>
  <path d="M 90,186 L 90,248" stroke="#CC00CC" stroke-width="0.7" opacity="0.3"/>
  <path d="M 108,186 L 124,248" stroke="#CC00CC" stroke-width="0.7" opacity="0.3"/>
</svg>
