<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Shorts: waistband y=180-188, legs to y=230 -->
  <!-- Waistband -->
  <rect x="50" y="180" width="80" height="8" rx="3" ry="3" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5"/>
  <!-- Left leg -->
  <path d="
    M 50,188
    L 48,226
    Q 48,230 52,230
    L 72,230
    Q 76,230 76,226
    L 76,188
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right leg -->
  <path d="
    M 104,188
    L 104,226
    Q 104,230 108,230
    L 128,230
    Q 132,230 132,226
    L 130,188
    Z
  " fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Crotch bridge -->
  <path d="M 76,188 L 76,216 Q 78,224 90,224 Q 102,224 104,216 L 104,188" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Center seam -->
  <path d="M 90,188 L 88,216 M 90,188 L 92,216" stroke="#CC00CC" stroke-width="0.8" opacity="0.5"/>
  <!-- Hem fold lines -->
  <path d="M 50,224 Q 60,222 72,226" stroke="#CC00CC" stroke-width="0.6" opacity="0.4"/>
  <path d="M 130,224 Q 120,222 108,226" stroke="#CC00CC" stroke-width="0.6" opacity="0.4"/>
</svg>
