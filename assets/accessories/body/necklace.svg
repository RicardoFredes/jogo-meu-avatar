<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Bead Necklace - gold #FFD700, NOT colorizable -->
  <g>
    <!-- Chain/string arc -->
    <path d="M68,108 Q72,114 78,118 Q84,122 90,125 Q96,122 102,118 Q108,114 112,108" fill="none" stroke="#B8860B" stroke-width="1.2"/>
    <!-- Beads along the chain -->
    <circle cx="68" cy="108" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="73" cy="112" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="79" cy="117" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="84" cy="121" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="96" cy="121" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="101" cy="117" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="107" cy="112" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="112" cy="108" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <!-- Center pendant bead (larger) -->
    <circle cx="90" cy="125" r="4" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
    <!-- Pendant drop -->
    <path d="M86,128 L90,138 L94,128 Z" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <!-- Pendant gem -->
    <circle cx="90" cy="132" r="2" fill="#E74C3C" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Shine highlights -->
    <circle cx="67" cy="107" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="78" cy="116" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="89" cy="124" r="1.2" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="100" cy="116" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="111" cy="107" r="1" fill="#FFFFFF" opacity="0.4"/>
  </g>
</svg>
