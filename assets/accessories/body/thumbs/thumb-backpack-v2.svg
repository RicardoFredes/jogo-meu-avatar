<svg xmlns="http://www.w3.org/2000/svg" viewBox="200 370 200 200" fill="none">
  <g transform="translate(300,480) scale(1.8) translate(-90,-140)">
    <!-- Cute Backpack - colorizable #FF00FF - goes BEHIND body -->
  <g>
    <!-- Main backpack body -->
    <rect x="65" y="118" width="50" height="67" rx="10" ry="10" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5"/>
    <!-- Top flap / rounded top -->
    <path d="M68,125 Q68,110 90,108 Q112,110 112,125" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Left strap (visible over left shoulder) -->
    <path d="M72,112 Q66,108 68,104 Q72,106 74,110 L76,140 Q76,144 72,144 L72,112" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Right strap (visible over right shoulder) -->
    <path d="M108,112 Q114,108 112,104 Q108,106 106,110 L104,140 Q104,144 108,144 L108,112" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Front pocket -->
    <rect x="76" y="148" width="28" height="24" rx="6" ry="6" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.2"/>
    <!-- Pocket zipper line -->
    <line x1="82" y1="148" x2="82" y2="156" stroke="#CC00CC" stroke-width="0.8"/>
    <!-- Zipper pull -->
    <circle cx="82" cy="152" r="1.5" fill="#CC00CC"/>
    <!-- Top handle -->
    <path d="M84,108 Q84,100 90,100 Q96,100 96,108" fill="none" stroke="#CC00CC" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Decorative button/pin -->
    <circle cx="90" cy="136" r="3" fill="#CC00CC" opacity="0.5"/>
    <circle cx="90" cy="136" r="1.5" fill="#FFFFFF" opacity="0.3"/>
  </g>
  </g>
</svg>