<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Delicate Tiara - NOT colorizable -->
  <g>
    <!-- Tiara band arc -->
    <path d="M55,12 Q70,6 90,4 Q110,6 125,12" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <!-- Tiara points -->
    <path d="M68,10 L72,0 L78,8" fill="#FFD700" stroke="#B8860B" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M78,7 L82,-2 L90,-6 L98,-2 L102,7" fill="#FFD700" stroke="#B8860B" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M102,8 L108,0 L112,10" fill="#FFD700" stroke="#B8860B" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Center pink gem (heart shaped) -->
    <path d="M86,-2 Q86,-6 90,-6 Q94,-6 94,-2 L90,4 Z" fill="#FF69B4" stroke="#B8860B" stroke-width="0.8"/>
    <!-- Side pink gems -->
    <circle cx="74" cy="2" r="2.5" fill="#FF69B4" stroke="#B8860B" stroke-width="0.8"/>
    <circle cx="106" cy="2" r="2.5" fill="#FF69B4" stroke="#B8860B" stroke-width="0.8"/>
    <!-- Small accent gems -->
    <circle cx="84" cy="0" r="1.5" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="96" cy="0" r="1.5" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Shine at top -->
    <line x1="88" y1="-8" x2="90" y2="-12" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="92" y1="-8" x2="90" y2="-12" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
