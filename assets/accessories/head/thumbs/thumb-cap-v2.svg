<svg xmlns="http://www.w3.org/2000/svg" viewBox="230 164 150 68" fill="none">

  <!-- Baseball Cap - colorizable -->
  <g fill="#FF00FF">
    <!-- Cap dome covering top of head -->
    <path d="M248,210 Q248,178 300,170 Q352,178 352,210 Z"
      stroke="#CC00CC" stroke-width="3" stroke-linejoin="round"/>
    <!-- Brim extending forward -->
    <path d="M242,210 Q244,206 250,206 L350,206 Q356,206 360,210 L368,222 Q372,228 364,226 L240,216 Q236,216 242,210 Z"
      stroke="#CC00CC" stroke-width="3" stroke-linejoin="round"/>
    <!-- Panel seam lines -->
    <path d="M300,170 L300,208" stroke="#CC00CC" stroke-width="1.2" opacity="0.4"/>
    <path d="M272,176 L260,208" stroke="#CC00CC" stroke-width="1.2" opacity="0.4"/>
    <path d="M328,176 L340,208" stroke="#CC00CC" stroke-width="1.2" opacity="0.4"/>
    <!-- Top button -->
    <circle cx="300" cy="172" r="4" fill="#CC00CC"/>
    <!-- Brim edge detail -->
    <path d="M250,210 Q300,214 360,212" fill="none" stroke="#CC00CC" stroke-width="1.5" opacity="0.5"/>
  </g>

</svg>
