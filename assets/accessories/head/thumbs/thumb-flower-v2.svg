<svg viewBox="226 174 50 56" fill="none" xmlns="http://www.w3.org/2000/svg">


  <!-- Large flower on left side - colorizable -->
  <g fill="#FF00FF">
    <!-- Petals -->
    <ellipse cx="252" cy="192" rx="14" ry="8" transform="rotate(0, 252, 192)"
      stroke="#CC00CC" stroke-width="2.5"/>
    <ellipse cx="252" cy="192" rx="14" ry="8" transform="rotate(60, 252, 192)"
      stroke="#CC00CC" stroke-width="2.5"/>
    <ellipse cx="252" cy="192" rx="14" ry="8" transform="rotate(120, 252, 192)"
      stroke="#CC00CC" stroke-width="2.5"/>
    <!-- Center -->
    <circle cx="252" cy="192" r="7" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
    <!-- Small center dots -->
    <circle cx="250" cy="190" r="1.5" fill="#DAA520"/>
    <circle cx="254" cy="190" r="1.5" fill="#DAA520"/>
    <circle cx="252" cy="194" r="1.5" fill="#DAA520"/>
    <!-- Leaf -->
    <path d="M252 200 Q240 212 236 220 Q246 214 252 208"
      fill="#2ECC71" stroke="#27AE60" stroke-width="1.5" stroke-linejoin="round"/>
  </g>


</svg>