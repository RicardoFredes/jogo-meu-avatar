<svg viewBox="228 166 144 60" fill="none" xmlns="http://www.w3.org/2000/svg">


  <!-- Cat ears headband - colorizable -->
  <g fill="#FF00FF">
    <!-- Headband arc -->
    <path d="M242 216 Q270 204 300 200 Q330 204 358 216"
      fill="none" stroke="#CC00CC" stroke-width="4" stroke-linecap="round"/>
    <!-- Left ear outer -->
    <path d="M252,210 L238,176 L270,200 Z"
      stroke="#CC00CC" stroke-width="3" stroke-linejoin="round"/>
    <!-- Left ear inner -->
    <path d="M254,206 L244,184 L266,200 Z"
      fill="#CC00CC" opacity="0.5"/>
    <!-- Right ear outer -->
    <path d="M348,210 L362,176 L330,200 Z"
      stroke="#CC00CC" stroke-width="3" stroke-linejoin="round"/>
    <!-- Right ear inner -->
    <path d="M346,206 L356,184 L334,200 Z"
      fill="#CC00CC" opacity="0.5"/>
  </g>


</svg>