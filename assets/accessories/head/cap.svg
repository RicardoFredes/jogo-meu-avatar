<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Baseball Cap - colorizable #FF00FF -->
  <g>
    <!-- Cap dome covering top of head -->
    <path d="M52,42 Q52,8 90,2 Q128,8 128,42 Z" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Brim extending forward -->
    <path d="M46,42 Q46,38 52,38 L128,38 Q134,38 136,42 L140,50 Q142,54 136,52 L46,46 Q44,46 46,42 Z" fill="#FF00FF" stroke="#CC00CC" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Cap panel seam lines -->
    <path d="M90,2 L90,40" stroke="#CC00CC" stroke-width="0.8" opacity="0.4"/>
    <path d="M70,6 L62,40" stroke="#CC00CC" stroke-width="0.8" opacity="0.4"/>
    <path d="M110,6 L118,40" stroke="#CC00CC" stroke-width="0.8" opacity="0.4"/>
    <!-- Top button -->
    <circle cx="90" cy="4" r="2.5" fill="#CC00CC"/>
    <!-- Brim edge detail -->
    <path d="M52,42 Q90,46 136,44" fill="none" stroke="#CC00CC" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
