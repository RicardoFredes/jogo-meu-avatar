<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 320">
  <!-- Golden Crown - NOT colorizable -->
  <g>
    <!-- Crown base band -->
    <rect x="55" y="4" width="70" height="14" rx="3" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Crown points -->
    <polygon points="55,4 58,-4 68,2 78,-10 88,2 90,-12 92,2 102,-10 112,2 122,-4 125,4" fill="#FFD700" stroke="#B8860B" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Base band detail line -->
    <line x1="57" y1="11" x2="123" y2="11" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
    <!-- Red gems on crown points -->
    <circle cx="78" cy="-5" r="3" fill="#E74C3C" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="90" cy="-7" r="3.5" fill="#E74C3C" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="102" cy="-5" r="3" fill="#E74C3C" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Small gold dots on base band -->
    <circle cx="70" cy="11" r="1.5" fill="#B8860B"/>
    <circle cx="90" cy="11" r="1.5" fill="#B8860B"/>
    <circle cx="110" cy="11" r="1.5" fill="#B8860B"/>
  </g>
</svg>
