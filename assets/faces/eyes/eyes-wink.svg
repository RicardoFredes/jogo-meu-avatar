<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40">
  <!-- Left eye - open round -->
  <ellipse cx="22" cy="20" rx="10" ry="11" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
  <circle cx="22" cy="21" r="7" fill="#FF00FF"/>
  <circle cx="22" cy="22" r="4" fill="#1A1A2E"/>
  <circle cx="19" cy="17" r="2" fill="#FFFFFF"/>
  <!-- Right eye - closed wink -->
  <path d="M48 22 Q58 14 68 22" fill="none" stroke="#2C2C2C" stroke-width="2.5" stroke-linecap="round"/>
