  <circle cx="255" cy="178" r="25" fill="#FF00FF" stroke="#CC00CC" stroke-width="4"/>
  <circle cx="300" cy="170" r="26" fill="#FF00FF" stroke="#CC00CC" stroke-width="4"/>
  <circle cx="345" cy="178" r="25" fill="#FF00FF" stroke="#CC00CC" stroke-width="4"/>
  <circle cx="390" cy="195" r="22" fill="#FF00FF" stroke="#CC00CC" stroke-width="4"/>
  <!-- Mechas laterais encaracoladas -->
  <circle cx="178" cy="225" r="18" fill="#FF00FF" stroke="#CC00CC" stroke-width="3"/>
  <circle cx="422" cy="225" r="18" fill="#FF00FF" stroke="#CC00CC" stroke-width="3"/>

